services:
  redis:
    image: redis:latest
    container_name: notification-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: notification-service-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=notification-service-redis
      - RI_REDIS_PASSWORD=${REDIS_PASSWORD}

  ocr-provider:
    build:
      context: ./OcrProviderService
    container_name: ocr-provider
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file: ./OcrProviderService/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  ocr-consumer:
    build:
      context: ./OcrConsumerService
    container_name: ocr-consumer
    ports:
      - "8001:8001"
    restart: unless-stopped
    env_file: ./OcrConsumerService/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  redisinsight_data: